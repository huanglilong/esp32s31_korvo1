dependencies:
  # Brookesia master/v0.8 from local checkout (GitHub is unreachable in this network).
  # The Brookesia HAL (brookesia_hal_boards/adaptor) requires esp_board_manager 0.5.*,
  # but our project uses 0.6.x. HAL components are NOT pulled in by the services below
  # (they are only used by the runtime/system layer), so the version mismatch is deferred.
  espressif/brookesia_service_display:
    path: /home/llhuang/works/opensource/esp-brookesia/service/media/brookesia_service_display
  espressif/brookesia_service_audio:
    path: /home/llhuang/works/opensource/esp-brookesia/service/media/brookesia_service_audio
  espressif/brookesia_service_video:
    path: /home/llhuang/works/opensource/esp-brookesia/service/media/brookesia_service_video
  espressif/brookesia_gui_lvgl:
    path: /home/llhuang/works/opensource/esp-brookesia/gui/brookesia_gui_lvgl

  espressif/mdns:
    version: ^1.0
  espressif/esp_audio_simple_player:
    version: ^1.0.0
  espressif/esp_audio_codec:
    version: ^2.0
  espressif/cjson:
    version: ^1.7
  espressif/esp_codec_dev:
    version: ^1.5
  # Official BSP for ESP32-S31-Korvo-1: provides Display/LVGL/Touch/Buttons/Audio/SDCARD/LED/Camera drivers
  espressif/esp32_s31_korvo_1:
    version: ^1.0.0~1
  # V4L2 video device support (camera DVP → /dev/video0)
  espressif/esp_video:
    version: ^2.2
  protocol_examples_common:
    path: ${IDF_PATH}/examples/common_components/protocol_examples_common
  idf:
    version: '>=5.3'
  espressif/esp_board_manager: '>=0.6.0'
