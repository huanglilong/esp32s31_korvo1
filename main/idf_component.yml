dependencies:
  # Brookesia master/v0.8 from components/esp-brookesia/ (patched copy, editable)
  espressif/brookesia_service_display:
    path: ../components/esp-brookesia/service/media/brookesia_service_display
  espressif/brookesia_service_audio:
    path: ../components/esp-brookesia/service/media/brookesia_service_audio
  espressif/brookesia_service_video:
    path: ../components/esp-brookesia/service/media/brookesia_service_video
  espressif/brookesia_gui_lvgl:
    path: ../components/esp-brookesia/gui/brookesia_gui_lvgl
  espressif/brookesia_hal_boards:
    path: ../components/esp-brookesia/hal/brookesia_hal_boards
  espressif/brookesia_hal_adaptor:
    path: ../components/esp-brookesia/hal/brookesia_hal_adaptor
  espressif/brookesia_service_manager:
    path: ../components/esp-brookesia/service/framework/brookesia_service_manager
  espressif/brookesia_service_helper:
    path: ../components/esp-brookesia/service/framework/brookesia_service_helper
  espressif/brookesia_runtime_manager:
    path: ../components/esp-brookesia/runtime/brookesia_runtime_manager

  espressif/mdns:
    version: ^1.0
  espressif/esp_audio_simple_player:
    version: ^1.0.0
  espressif/esp_audio_codec:
    version: ^2.0
  espressif/cjson:
    version: ^1.7
  espressif/esp_codec_dev:
    version: ^1.5
  espressif/esp32_s31_korvo_1:
    version: ^1.0.0~1
  espressif/esp_video:
    version: ^2.2
  # Note: protocol_examples_common removed — it pulls in ethernet_init which we don't need.
  # If you need example WiFi connect helpers, add it back, but it adds ~15 KB SRAM overhead.
  idf:
    version: '>=5.3'
  espressif/esp_board_manager: '>=0.6.0'
